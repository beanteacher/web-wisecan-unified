name: backend-ci

# 백엔드 CI — 정본 골격: .claude/devops/build-run.md §5
# 게이트 정책(main 직접 push 금지 → PR 필수): .claude/rules/git-workflow.md
on:
  push:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'

# 같은 ref 에 새 푸시가 오면 진행 중인 실행을 취소
concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: backend

jobs:
  build-test:
    name: test + bootJar
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Gradle (with cache)
        uses: gradle/actions/setup-gradle@v4

      - name: Build · Test · bootJar
        run: ./gradlew clean test bootJar --no-daemon --console=plain

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-report
          path: backend/build/reports/tests/test
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload bootJar
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: backend-bootjar
          path: backend/build/libs/*.jar
          retention-days: 7
          if-no-files-found: error
