version: '3.8'
services:
  mysql:
    image: mysql:8.0
    container_name: wisecan-unified-mysql
    ports:
      - "3309:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: wisecan_unified
    volumes:
      - mysql-data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    container_name: wisecan-unified-redis
    ports:
      - "6379:6379"

volumes:
  mysql-data:
