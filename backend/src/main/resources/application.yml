server:
  port: 8080

spring:
  application:
    name: wisecan-b2c
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  datasource:
    url: jdbc:mysql://localhost:3309/wisecan_b2c?useSSL=false&allowPublicKeyRetrieval=true
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        highlight_sql: true
        use_sql_comments: true
    open-in-view: false
  data:
    redis:
      host: localhost
      port: 6379
  cache:
    type: redis
    redis:
      time-to-live: 3600000  # 1시간

jwt:
  secret: wisecan-b2c-jwt-secret-key-must-be-at-least-256-bits-long-for-hs256
  access-expiration: 3600000    # 1시간
  refresh-expiration: 604800000 # 7일

wisecan:
  mcp:
    command: node mcp-server/index.js
    timeout-ms: 10000
  rate-limit:
    per-minute: 60
    mode: redis   # redis | memory

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus

logging:
  level:
    root: INFO
    com.wisecan.b2c: INFO
    org.springframework.web: INFO
    org.springframework.security: WARN
    org.hibernate: WARN
    org.hibernate.SQL: OFF
  pattern:
    console: "%d{HH:mm:ss.SSS} %highlight(%-5level) [%thread] %cyan(%logger{36}) - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n"
  file:
    name: logs/wisecan-b2c.log
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 30

---
# 로컬 개발 프로파일 — SQL / 바인딩 / Security 상세 로그
spring:
  config:
    activate:
      on-profile: local
  jpa:
    hibernate:
      ddl-auto: update

logging:
  level:
    com.wisecan.b2c: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
    org.springframework.security: DEBUG
    org.springframework.web.cors: DEBUG
