server:
  port: 8080

spring:
  application:
    name: wisecan-unified
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  datasource:
    url: jdbc:mysql://localhost:3309/wisecan_unified?useSSL=false&allowPublicKeyRetrieval=true
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        highlight_sql: true
        use_sql_comments: true
    open-in-view: false
  data:
    redis:
      host: localhost
      port: 6379
  cache:
    type: redis
    redis:
      time-to-live: 3600000  # 1시간

jwt:
  secret: wisecan-unified-jwt-secret-key-must-be-at-least-256-bits-long-for-hs256
  access-expiration: 3600000    # 1시간
  refresh-expiration: 604800000 # 7일

spring.ai:
  mcp:
    server:
      enabled: true
      name: wisecan-unified-mcp
      version: 0.0.1
      protocol: STREAMABLE          # SSE | STREAMABLE | STATELESS
      sse-message-endpoint: /mcp    # Streamable HTTP 엔드포인트 (기본 /mcp)
      type: SYNC                    # SYNC | ASYNC
      instructions: "wisecan B2C 메시지 발송/조회 도구"

wisecan:
  rate-limit:
    per-minute: 60
    mode: redis   # redis | memory

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus

logging:
  level:
    root: INFO
    com.wisecan.unified: DEBUG
    com.wisecan.unified.service.AuthService: DEBUG
    org.springframework.web: INFO
    org.springframework.security: WARN
    org.hibernate: WARN
    org.hibernate.SQL: OFF
  charset:
    console: UTF-8
    file: UTF-8
  pattern:
    # Spring Boot 전용 컬러 컨버터 %clr 사용 — Logback 의 %highlight / %cyan 은 Windows 에서 출력 누락 사례가 있음
    console: "%clr(%d{HH:mm:ss.SSS}){faded} %clr(%-5level) %clr([%thread]){faded} %clr(%-40.40logger{39}){cyan} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n"
  file:
    name: logs/wisecan-unified.log
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 30

