server:
  port: 8080

spring:
  application:
    name: wisecan-b2c
  datasource:
    url: jdbc:mysql://localhost:3306/wisecan_b2c?useSSL=false&allowPublicKeyRetrieval=true
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  data:
    redis:
      host: localhost
      port: 6379
  cache:
    type: redis
    redis:
      time-to-live: 3600000  # 1시간

jwt:
  secret: wisecan-b2c-jwt-secret-key-must-be-at-least-256-bits-long-for-hs256
  access-expiration: 3600000    # 1시간
  refresh-expiration: 604800000 # 7일

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus

---
# 로컬 개발 프로파일
spring:
  config:
    activate:
      on-profile: local
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
