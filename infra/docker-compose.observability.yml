# 옵저버빌리티 스택 (W-003) — Prometheus + Alertmanager + Grafana
# 정본: pm/06_OBSERVABILITY.md
# 기동:  docker compose -f infra/docker-compose.observability.yml up -d
# 전제:  백엔드가 호스트에서 :8080 으로 떠 있어야 scrape 됨 (extra_hosts 로 backend → host 매핑)
#        Discord webhook 은 infra/alertmanager/secrets/discord_webhook_url 파일로 주입(gitignore)
services:
  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: wisecan-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ../backend/src/main/resources/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../backend/src/main/resources/alerts:/etc/prometheus/alerts:ro
      - prometheus-data:/prometheus
    extra_hosts:
      # prometheus.yml 의 target `backend:8080` 을 호스트(bootRun 백엔드)로 해석
      - "backend:host-gateway"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:v0.28.1
    container_name: wisecan-alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - ./alertmanager/secrets:/etc/alertmanager/secrets:ro
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.3.0
    container_name: wisecan-grafana
    ports:
      # 프론트가 3000 을 쓰므로 Grafana 는 호스트 3001 로 노출
      - "3001:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  prometheus-data:
  grafana-data:
