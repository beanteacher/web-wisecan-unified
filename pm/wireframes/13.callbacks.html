<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>발신번호 관리 — WiseCan</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="_shared/tw-config.js"></script>
  <link rel="stylesheet" href="_shared/style.css">
</head>
<body>
<div data-site-header></div>
<main class="pt-16">
  <div class="flex">
    <div data-member-sidebar data-active="13.callbacks.html"></div>
    <div class="flex-1 p-8 bg-cloud min-h-screen">

      <div class="mb-8 flex items-start justify-between">
        <div>
          <p class="eyebrow">sender</p>
          <h1 class="text-2xl font-semibold text-ink mt-1">발신번호 관리</h1>
        </div>
        <a href="14.callbacks-registration.html" class="btn btn-primary px-5 py-2.5 rounded-full text-sm flex items-center gap-2">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
          발신번호 등록
        </a>
      </div>

      <!-- 안내 배너 -->
      <div class="flex items-start gap-3 p-4 rounded-xl bg-psblue-wash border border-psblue-soft mb-5">
        <svg class="text-psblue-main flex-shrink-0 mt-0.5" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
        <p class="text-xs text-psblue-deep">발신번호는 통신사 심사 후 승인됩니다. 심사에는 영업일 기준 1~3일이 소요될 수 있습니다.</p>
      </div>

      <!-- 검색 + 상태 필터 -->
      <div class="surface rounded-2xl p-4 mb-5 flex items-center gap-3 flex-wrap">
        <div class="relative flex-1 min-w-[200px] max-w-xs">
          <svg class="absolute left-3 top-1/2 -translate-y-1/2 text-stone" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input class="input pl-9 text-sm" placeholder="번호 검색">
        </div>
        <!-- 상태 필터 탭 -->
        <div class="flex gap-2">
          <button class="px-4 py-2 rounded-full text-sm font-medium bg-psblue-main text-white">전체</button>
          <button class="px-4 py-2 rounded-full text-sm font-medium bg-white border border-line text-slate2">승인</button>
          <button class="px-4 py-2 rounded-full text-sm font-medium bg-white border border-line text-slate2">심사 중</button>
          <button class="px-4 py-2 rounded-full text-sm font-medium bg-white border border-line text-slate2">반려</button>
        </div>
      </div>

      <!-- 발신번호 표 -->
      <div class="surface rounded-2xl overflow-hidden">
        <table class="w-full text-sm">
          <thead class="bg-cloud text-xs text-stone uppercase tracking-widest">
            <tr>
              <th class="text-left px-6 py-3 font-semibold border-b border-mist">발신번호</th>
              <th class="text-left px-6 py-3 font-semibold border-b border-mist">유형</th>
              <th class="text-left px-6 py-3 font-semibold border-b border-mist">메모</th>
              <th class="text-left px-6 py-3 font-semibold border-b border-mist">상태</th>
              <th class="text-left px-6 py-3 font-semibold border-b border-mist">등록일</th>
              <th class="px-6 py-3 border-b border-mist"></th>
            </tr>
          </thead>
          <tbody class="divide-y divide-mist">
            <!-- 승인 -->
            <tr>
              <td class="px-6 py-4 font-mono text-graphite">02-1234-5678</td>
              <td class="px-6 py-4">
                <span class="px-2.5 py-1 rounded-full text-xs font-medium bg-mist text-graphite">일반</span>
              </td>
              <td class="px-6 py-4 text-slate2">대표 번호</td>
              <td class="px-6 py-4">
                <span class="flex items-center gap-1.5 text-xs text-green-700 font-medium">
                  <span class="status-dot bg-green-500"></span>승인
                </span>
              </td>
              <td class="px-6 py-4 text-xs text-slate2">2026-01-20</td>
              <td class="px-6 py-4 text-right">
                <button class="text-xs text-psred-main hover:text-psred-deep font-medium">삭제</button>
              </td>
            </tr>
            <!-- 승인 -->
            <tr>
              <td class="px-6 py-4 font-mono text-graphite">010-9876-5432</td>
              <td class="px-6 py-4">
                <span class="px-2.5 py-1 rounded-full text-xs font-medium bg-mist text-graphite">휴대폰</span>
              </td>
              <td class="px-6 py-4 text-slate2">마케팅 전용</td>
              <td class="px-6 py-4">
                <span class="flex items-center gap-1.5 text-xs text-green-700 font-medium">
                  <span class="status-dot bg-green-500"></span>승인
                </span>
              </td>
              <td class="px-6 py-4 text-xs text-slate2">2026-02-05</td>
              <td class="px-6 py-4 text-right">
                <button class="text-xs text-psred-main hover:text-psred-deep font-medium">삭제</button>
              </td>
            </tr>
            <!-- 심사 중 -->
            <tr>
              <td class="px-6 py-4 font-mono text-graphite">1600-0000</td>
              <td class="px-6 py-4">
                <span class="px-2.5 py-1 rounded-full text-xs font-medium bg-mist text-graphite">대표번호</span>
              </td>
              <td class="px-6 py-4 text-slate2">고객센터</td>
              <td class="px-6 py-4">
                <span class="flex items-center gap-1.5 text-xs text-amber-600 font-medium">
                  <span class="status-dot bg-amber-400"></span>심사 중
                </span>
              </td>
              <td class="px-6 py-4 text-xs text-slate2">2026-05-28</td>
              <td class="px-6 py-4 text-right">
                <button class="text-xs text-slate2 hover:text-graphite font-medium">취소</button>
              </td>
            </tr>
            <!-- 반려 -->
            <tr>
              <td class="px-6 py-4 font-mono text-graphite">070-1234-5678</td>
              <td class="px-6 py-4">
                <span class="px-2.5 py-1 rounded-full text-xs font-medium bg-mist text-graphite">인터넷전화</span>
              </td>
              <td class="px-6 py-4 text-slate2">—</td>
              <td class="px-6 py-4">
                <div>
                  <span class="flex items-center gap-1.5 text-xs text-psred-main font-medium">
                    <span class="status-dot bg-psred-main"></span>반려
                  </span>
                  <p class="text-xs text-stone mt-0.5">서류 미비 — 재등록 필요</p>
                </div>
              </td>
              <td class="px-6 py-4 text-xs text-slate2">2026-05-10</td>
              <td class="px-6 py-4 text-right">
                <button class="text-xs text-psred-main hover:text-psred-deep font-medium">삭제</button>
              </td>
            </tr>
          </tbody>
        </table>

        <div class="px-6 py-4 flex items-center justify-between border-t border-mist">
          <p class="text-xs text-stone">전체 4건</p>
          <div class="flex items-center gap-1">
            <button class="px-3 py-1.5 rounded-lg text-xs text-stone border border-mist bg-white">이전</button>
            <button class="px-3 py-1.5 rounded-lg text-xs font-medium bg-psblue-main text-white">1</button>
            <button class="px-3 py-1.5 rounded-lg text-xs text-stone border border-mist bg-white">다음</button>
          </div>
        </div>
      </div>

    </div>
  </div>
</main>
<div data-site-footer data-page-id="PG-CALLBACK-001"></div>
<script src="_shared/site.js"></script>
</body>
</html>
