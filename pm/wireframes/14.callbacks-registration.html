<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>발신번호 등록 — WiseCan</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="_shared/tw-config.js"></script>
  <link rel="stylesheet" href="_shared/style.css">
</head>
<body>
<div data-site-header></div>
<main class="pt-16">
  <div class="flex">
    <div data-member-sidebar data-active="13.callbacks.html"></div>
    <div class="flex-1 p-8 bg-cloud min-h-screen">

      <div class="mb-8">
        <p class="eyebrow">sender</p>
        <h1 class="text-2xl font-semibold text-ink mt-1">발신번호 등록</h1>
      </div>

      <div class="max-w-2xl space-y-6">

        <!-- 등록 유형 선택 -->
        <div class="surface rounded-2xl p-6">
          <h2 class="text-base font-semibold text-graphite mb-4">등록 유형 <span class="text-psred-main">*</span></h2>
          <div class="grid grid-cols-2 gap-3">
            <!-- 선택됨: 사업자 번호 -->
            <label class="flex items-start gap-3 p-4 rounded-xl border-2 border-psblue-main bg-psblue-wash cursor-pointer">
              <span class="radio checked mt-0.5 flex-shrink-0"></span>
              <div>
                <p class="text-sm font-semibold text-graphite">사업자 번호</p>
                <p class="text-xs text-slate2 mt-1">사업자 등록증에 기재된 전화번호</p>
              </div>
            </label>
            <label class="flex items-start gap-3 p-4 rounded-xl border border-line cursor-pointer">
              <span class="radio mt-0.5 flex-shrink-0"></span>
              <div>
                <p class="text-sm font-medium text-graphite">휴대폰 번호</p>
                <p class="text-xs text-slate2 mt-1">본인 명의 휴대폰으로 인증</p>
              </div>
            </label>
            <label class="flex items-start gap-3 p-4 rounded-xl border border-line cursor-pointer">
              <span class="radio mt-0.5 flex-shrink-0"></span>
              <div>
                <p class="text-sm font-medium text-graphite">통신서비스 이용증명원</p>
                <p class="text-xs text-slate2 mt-1">통신사 발급 서류로 인증</p>
              </div>
            </label>
            <label class="flex items-start gap-3 p-4 rounded-xl border border-line cursor-pointer">
              <span class="radio mt-0.5 flex-shrink-0"></span>
              <div>
                <p class="text-sm font-medium text-graphite">전화번호 사용 동의서</p>
                <p class="text-xs text-slate2 mt-1">타인 명의 번호 사용 시</p>
              </div>
            </label>
          </div>
        </div>

        <!-- 동적 폼: 사업자 번호 선택 시 -->
        <div class="surface rounded-2xl p-6 space-y-5">
          <h2 class="text-base font-semibold text-graphite">등록 정보</h2>

          <!-- 발신번호 -->
          <div>
            <label class="field-label block mb-2">발신번호 <span class="text-psred-main">*</span></label>
            <input class="input" placeholder="예: 02-1234-5678 또는 1600-0000">
            <p class="help">숫자와 하이픈(-)만 입력 가능합니다.</p>
          </div>

          <!-- 사업자등록번호 -->
          <div>
            <label class="field-label block mb-2">사업자등록번호 <span class="text-psred-main">*</span></label>
            <input class="input" placeholder="예: 123-45-67890">
          </div>

          <!-- 상호명 -->
          <div>
            <label class="field-label block mb-2">상호명 <span class="text-psred-main">*</span></label>
            <input class="input" placeholder="사업자 등록증의 상호명과 동일하게 입력">
          </div>

          <!-- 사업자등록증 파일 첨부 -->
          <div>
            <label class="field-label block mb-2">사업자등록증 <span class="text-psred-main">*</span></label>
            <div class="border-2 border-dashed border-mist rounded-xl p-6 text-center hover:border-psblue-soft transition-colors cursor-pointer">
              <svg class="mx-auto text-stone mb-2" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
              <p class="text-sm text-slate2">파일을 드래그하거나 <span class="text-psblue-main font-medium">클릭해서 업로드</span></p>
              <p class="text-xs text-stone mt-1">PDF, JPG, PNG · 최대 10MB</p>
            </div>
          </div>

          <!-- 메모 -->
          <div>
            <label class="field-label block mb-2">메모 <span class="text-stone font-normal">(선택)</span></label>
            <input class="input" placeholder="관리용 메모 (예: 대표 번호, 마케팅 전용)">
          </div>
        </div>

        <!-- 이용 동의 -->
        <div class="surface rounded-2xl p-6">
          <h2 class="text-base font-semibold text-graphite mb-4">이용 동의</h2>
          <div class="space-y-3">
            <label class="flex items-start gap-3 cursor-pointer">
              <span class="check checked flex-shrink-0 mt-0.5"></span>
              <p class="text-sm text-slate2">등록하는 발신번호는 실제 사용 권한이 있는 번호임을 확인합니다.</p>
            </label>
            <label class="flex items-start gap-3 cursor-pointer">
              <span class="check flex-shrink-0 mt-0.5"></span>
              <p class="text-sm text-slate2">허위 서류 제출 시 계정이 즉시 정지될 수 있음을 동의합니다.</p>
            </label>
            <label class="flex items-start gap-3 cursor-pointer">
              <span class="check flex-shrink-0 mt-0.5"></span>
              <p class="text-sm text-slate2">발신번호 사전 등록제 관련 법령을 준수함을 동의합니다.</p>
            </label>
          </div>
        </div>

        <!-- 액션 -->
        <div class="flex gap-3">
          <a href="13.callbacks.html" class="btn btn-secondary flex-1 px-5 py-3 rounded-full text-sm text-center">취소</a>
          <button class="btn btn-primary flex-1 px-5 py-3 rounded-full text-sm">등록 신청</button>
        </div>

      </div>
    </div>
  </div>
</main>
<div data-site-footer data-page-id="PG-CALLBACK-002"></div>
<script src="_shared/site.js"></script>
</body>
</html>
