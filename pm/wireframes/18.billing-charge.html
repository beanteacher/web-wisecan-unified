<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>충전 — WiseCan</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="_shared/tw-config.js"></script>
  <link rel="stylesheet" href="_shared/style.css">
</head>
<body class="bg-white">

<!-- 상단 헤더 -->
<header class="fixed top-0 inset-x-0 h-16 bg-white border-b border-line flex items-center px-6 z-30">
  <a href="01.index.html" class="font-semibold text-lg tracking-tight text-ink mr-10">WiseCan</a>
  <nav class="flex items-center gap-6 text-sm">
    <a href="#" class="nav-link">대시보드</a>
    <a href="#" class="nav-link">발송</a>
    <a href="#" class="nav-link">이력</a>
    <a href="#" class="nav-link">템플릿</a>
    <a href="#" class="nav-link font-semibold text-ink">결제</a>
  </nav>
  <div class="ml-auto flex items-center gap-4">
    <span class="text-sm text-stone">잔액 <strong class="text-ink">₩123,450</strong></span>
    <button class="btn btn-primary text-sm px-4 py-1.5 rounded-lg">충전</button>
    <div class="w-8 h-8 rounded-full bg-psblue-wash flex items-center justify-center text-psblue-main text-sm font-semibold">김</div>
  </div>
</header>

<main class="pt-16">
  <div class="flex">
    <!-- 사이드바 -->
    <div data-member-sidebar data-active="18.billing-charge.html"></div>

    <!-- 메인 콘텐츠 -->
    <div class="flex-1 p-8 min-w-0">
      <div class="mb-6">
        <h1 class="text-xl font-semibold text-ink">충전</h1>
        <p class="text-sm text-stone mt-0.5">현재 잔액 <strong class="text-ink">₩123,450</strong></p>
      </div>

      <div class="max-w-2xl space-y-6">
        <!-- 결제 수단 -->
        <div class="surface rounded-xl p-6">
          <h2 class="text-sm font-semibold text-ink mb-4">결제 수단</h2>
          <div class="space-y-2">
            <!-- 신용카드 -->
            <label class="flex items-center gap-3 p-3 rounded-lg border border-line hover:border-psblue-main/50 cursor-pointer transition-colors has-[:checked]:border-psblue-main has-[:checked]:bg-psblue-wash/30">
              <input type="radio" name="payment" class="hidden" checked>
              <span class="radio checked shrink-0"></span>
              <div class="flex-1">
                <span class="text-sm font-medium text-ink">신용카드</span>
                <p class="text-xs text-stone mt-0.5">카드사 포인트·할인 적용 가능</p>
              </div>
              <svg class="w-6 h-6 text-stone" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
            </label>
            <!-- 체크카드 -->
            <label class="flex items-center gap-3 p-3 rounded-lg border border-line hover:border-psblue-main/50 cursor-pointer transition-colors">
              <input type="radio" name="payment" class="hidden">
              <span class="radio shrink-0"></span>
              <span class="text-sm font-medium text-ink flex-1">체크카드</span>
              <svg class="w-6 h-6 text-stone" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
            </label>
            <!-- 계좌이체 -->
            <label class="flex items-center gap-3 p-3 rounded-lg border border-line hover:border-psblue-main/50 cursor-pointer transition-colors">
              <input type="radio" name="payment" class="hidden">
              <span class="radio shrink-0"></span>
              <div class="flex-1">
                <span class="text-sm font-medium text-ink">계좌이체</span>
                <p class="text-xs text-stone mt-0.5">현금영수증 발행 가능</p>
              </div>
              <svg class="w-6 h-6 text-stone" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
            </label>
            <!-- 가상계좌 -->
            <label class="flex items-center gap-3 p-3 rounded-lg border border-line hover:border-psblue-main/50 cursor-pointer transition-colors">
              <input type="radio" name="payment" class="hidden">
              <span class="radio shrink-0"></span>
              <div class="flex-1">
                <span class="text-sm font-medium text-ink">가상계좌</span>
                <p class="text-xs text-stone mt-0.5">입금 확인 후 잔액 반영 · 현금영수증 발행 가능</p>
              </div>
              <svg class="w-6 h-6 text-stone" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20"/></svg>
            </label>
            <!-- 휴대폰 소액 -->
            <label class="flex items-center gap-3 p-3 rounded-lg border border-line hover:border-psblue-main/50 cursor-pointer transition-colors">
              <input type="radio" name="payment" class="hidden">
              <span class="radio shrink-0"></span>
              <div class="flex-1">
                <span class="text-sm font-medium text-ink">휴대폰 소액결제</span>
                <p class="text-xs text-stone mt-0.5">월 한도 내 결제 · 통신사 청구</p>
              </div>
              <svg class="w-6 h-6 text-stone" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg>
            </label>
            <!-- 상품권 -->
            <label class="flex items-center gap-3 p-3 rounded-lg border border-line hover:border-psblue-main/50 cursor-pointer transition-colors">
              <input type="radio" name="payment" class="hidden">
              <span class="radio shrink-0"></span>
              <div class="flex-1">
                <span class="text-sm font-medium text-ink">상품권</span>
                <p class="text-xs text-stone mt-0.5">현금영수증 발행 가능</p>
              </div>
              <svg class="w-6 h-6 text-stone" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 12V22H4V12"/><path d="M22 7H2v5h20V7z"/><path d="M12 22V7"/><path d="M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7z"/><path d="M12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"/></svg>
            </label>
            <!-- 포인트 -->
            <label class="flex items-center gap-3 p-3 rounded-lg border border-line hover:border-psblue-main/50 cursor-pointer transition-colors">
              <input type="radio" name="payment" class="hidden">
              <span class="radio shrink-0"></span>
              <div class="flex-1">
                <span class="text-sm font-medium text-ink">포인트</span>
                <p class="text-xs text-stone mt-0.5">보유 포인트: <strong class="text-ink">0P</strong> · 현금영수증 발행 가능</p>
              </div>
              <svg class="w-6 h-6 text-stone" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>
            </label>
          </div>

          <!-- 신용/체크카드 선택 시 현금영수증 안내 -->
          <div class="mt-4 p-3 bg-cloud rounded-lg text-xs text-stone">
            <svg class="w-3.5 h-3.5 text-stone inline mr-1" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            신용·체크카드 결제분에는 현금영수증이 발행되지 않습니다. 카드사에서 별도로 부가세를 처리합니다.
          </div>
        </div>

        <!-- 충전 금액 -->
        <div class="surface rounded-xl p-6">
          <h2 class="text-sm font-semibold text-ink mb-4">충전 금액</h2>
          <div class="grid grid-cols-3 gap-2 mb-4">
            <button class="border border-psblue-main bg-psblue-wash text-psblue-main text-sm font-semibold py-2.5 rounded-lg transition-colors">₩10,000</button>
            <button class="border border-line text-ink text-sm font-medium py-2.5 rounded-lg hover:border-psblue-main/50 transition-colors">₩30,000</button>
            <button class="border border-line text-ink text-sm font-medium py-2.5 rounded-lg hover:border-psblue-main/50 transition-colors">₩50,000</button>
            <button class="border border-line text-ink text-sm font-medium py-2.5 rounded-lg hover:border-psblue-main/50 transition-colors">₩100,000</button>
            <button class="border border-line text-ink text-sm font-medium py-2.5 rounded-lg hover:border-psblue-main/50 transition-colors">₩300,000</button>
            <button class="border border-line text-ink text-sm font-medium py-2.5 rounded-lg hover:border-psblue-main/50 transition-colors">₩500,000</button>
          </div>
          <div>
            <label class="field-label block mb-1">직접 입력</label>
            <div class="relative">
              <span class="absolute left-3 top-1/2 -translate-y-1/2 text-stone text-sm">₩</span>
              <input type="number" class="input pl-7 text-sm" placeholder="10,000" min="1000" step="1000">
            </div>
            <p class="help">최소 ₩1,000 · ₩1,000 단위</p>
          </div>
        </div>

        <!-- 현금영수증 신청 (계좌이체/가상계좌/상품권/포인트 시 노출) -->
        <div class="surface rounded-xl p-6 hidden">
          <h2 class="text-sm font-semibold text-ink mb-4">현금영수증 신청</h2>
          <div class="space-y-3">
            <label class="flex items-center gap-3 cursor-pointer">
              <span class="radio checked shrink-0"></span>
              <span class="text-sm text-ink">소득공제용 (휴대폰 번호)</span>
            </label>
            <label class="flex items-center gap-3 cursor-pointer">
              <span class="radio shrink-0"></span>
              <span class="text-sm text-ink">지출증빙용 (사업자등록번호)</span>
            </label>
            <label class="flex items-center gap-3 cursor-pointer">
              <span class="radio shrink-0"></span>
              <span class="text-sm text-ink">신청하지 않음</span>
            </label>
          </div>
          <div class="mt-3">
            <input type="text" class="input text-sm" placeholder="010-1234-5678">
          </div>
        </div>

        <!-- 결제 요약 -->
        <div class="surface rounded-xl p-5 bg-cloud">
          <div class="flex justify-between text-sm mb-2">
            <span class="text-stone">충전 금액</span>
            <span class="font-medium text-ink">₩10,000</span>
          </div>
          <div class="flex justify-between text-sm mb-3 pb-3 border-b border-line">
            <span class="text-stone">결제 수단</span>
            <span class="font-medium text-ink">신용카드</span>
          </div>
          <div class="flex justify-between text-base font-semibold">
            <span class="text-ink">충전 후 잔액</span>
            <span class="text-psblue-main">₩133,450</span>
          </div>
        </div>

        <button class="btn btn-commerce w-full py-3 rounded-xl text-base font-semibold">결제하기</button>
      </div>
    </div>
  </div>
</main>

<script src="_shared/site.js"></script>
</body>
</html>
