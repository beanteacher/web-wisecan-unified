<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>마이페이지 — WiseCan</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="_shared/tw-config.js"></script>
  <link rel="stylesheet" href="_shared/style.css">
</head>
<body>

<div data-site-header></div>

<main class="pt-16">
  <div class="flex">
    <div data-member-sidebar data-active="24.profile.html"></div>

    <div class="flex-1 p-8 bg-cloud min-h-screen">

      <div class="mb-8">
        <p class="eyebrow">account</p>
        <h1 class="text-2xl font-semibold text-ink mt-1">마이페이지</h1>
      </div>

      <div class="grid xl:grid-cols-3 gap-6 max-w-5xl">

        <!-- 회원 정보 카드 (좌측) -->
        <div class="surface rounded-2xl p-6 h-fit">
          <div class="flex flex-col items-center text-center">
            <div class="w-16 h-16 rounded-full bg-psblue-wash border-2 border-psblue-soft flex items-center justify-center text-psblue-main text-2xl font-semibold">홍</div>
            <p class="mt-3 text-base font-semibold text-graphite">홍길동</p>
            <p class="text-sm text-slate2 mt-1">hong@example.com</p>
            <span class="mt-3 px-3 py-1 rounded-full bg-mist text-xs text-graphite font-medium">개인 회원</span>
          </div>
          <div class="mt-6 space-y-3 text-sm border-t border-mist pt-5">
            <div class="flex justify-between">
              <span class="text-stone">가입일</span>
              <span class="text-graphite font-medium">2026-01-15</span>
            </div>
            <div class="flex justify-between">
              <span class="text-stone">본인인증</span>
              <span class="text-green-600 font-medium flex items-center gap-1">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
                완료
              </span>
            </div>
            <div class="flex justify-between">
              <span class="text-stone">2차 인증</span>
              <span class="text-slate2">미설정</span>
            </div>
          </div>
        </div>

        <!-- 수정 폼 (우측) -->
        <div class="xl:col-span-2 surface rounded-2xl p-6">
          <h2 class="text-base font-semibold text-graphite mb-6">정보 수정</h2>

          <div class="space-y-5">
            <!-- 이메일 (readonly) -->
            <div>
              <label class="field-label block mb-2">아이디 (이메일)</label>
              <div class="relative">
                <input class="input disabled-state pr-10" value="hong@example.com" disabled>
                <div class="absolute right-3 top-1/2 -translate-y-1/2 group cursor-default">
                  <svg class="text-stone" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
                  <div class="hidden group-hover:block absolute right-0 bottom-7 bg-graphite text-white text-xs rounded-lg px-3 py-2 w-48 z-10">이메일은 변경할 수 없습니다</div>
                </div>
              </div>
              <p class="help">아이디(이메일)는 변경할 수 없습니다.</p>
            </div>

            <!-- 이름 -->
            <div>
              <label class="field-label block mb-2">이름</label>
              <input class="input" value="홍길동">
            </div>

            <!-- 휴대폰 -->
            <div>
              <label class="field-label block mb-2">휴대폰</label>
              <div class="flex gap-2">
                <input class="input disabled-state flex-1" value="010-1234-5678" disabled>
                <button class="btn btn-secondary px-4 py-2 rounded-full text-sm flex-shrink-0">번호 변경</button>
              </div>
              <p class="help">번호 변경 시 본인인증이 필요합니다.</p>
            </div>

            <!-- 비밀번호 변경 -->
            <div class="pt-4 border-t border-mist">
              <h3 class="text-sm font-semibold text-graphite mb-4">비밀번호 변경</h3>
              <div class="space-y-4">
                <div>
                  <label class="field-label block mb-2">현재 비밀번호</label>
                  <input type="password" class="input" placeholder="현재 비밀번호 입력">
                </div>
                <div>
                  <label class="field-label block mb-2">새 비밀번호</label>
                  <input type="password" class="input" placeholder="10자 이상 · 영문·숫자·특수문자 중 2종 이상">
                </div>
                <div>
                  <label class="field-label block mb-2">새 비밀번호 확인</label>
                  <input type="password" class="input" placeholder="다시 입력">
                </div>
              </div>
            </div>
          </div>

          <!-- 액션 -->
          <div class="mt-8 flex gap-3 justify-end">
            <button class="btn btn-secondary px-5 py-2.5 rounded-full text-sm">취소</button>
            <button class="btn btn-primary px-5 py-2.5 rounded-full text-sm">저장</button>
          </div>

          <!-- Success 토스트 예시 -->
          <!-- <div class="mt-4 p-3 rounded-xl bg-green-50 border border-green-200 text-sm text-green-700 flex items-center gap-2">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6 9 17l-5-5"/></svg>
            변경되었습니다
          </div> -->
        </div>

      </div>

    </div>
  </div>
</main>

<div data-site-footer data-page-id="PG-PROFILE-001"></div>
<script src="_shared/site.js"></script>
</body>
</html>
