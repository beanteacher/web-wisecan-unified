<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>탈퇴 — WiseCan</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="_shared/tw-config.js"></script>
  <link rel="stylesheet" href="_shared/style.css">
</head>
<body>
<div data-site-header></div>
<main class="pt-16">
  <div class="flex">
    <div data-member-sidebar data-active="25.withdrawal.html"></div>
    <div class="flex-1 p-8 bg-cloud min-h-screen">

      <div class="mb-8">
        <p class="eyebrow">account</p>
        <h1 class="text-2xl font-semibold text-ink mt-1">탈퇴 신청</h1>
      </div>

      <div class="max-w-xl">

        <!-- 영향 체크리스트 -->
        <div class="surface rounded-2xl p-6 mb-6">
          <div class="flex items-start gap-3 mb-5">
            <span class="w-10 h-10 rounded-full flex items-center justify-center flex-shrink-0" style="background:#fde6ea; color:#cf0a2c;">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg>
            </span>
            <div>
              <h2 class="text-base font-semibold text-graphite">탈퇴 전 꼭 확인하세요</h2>
              <p class="text-sm text-slate2 mt-1">탈퇴 신청 후 운영자 처리 완료 시 계정이 삭제됩니다.</p>
            </div>
          </div>

          <div class="space-y-3">
            <div class="flex items-start gap-3 p-4 rounded-xl bg-cloud border border-line">
              <span class="w-5 h-5 rounded-full border-2 border-psred-main flex items-center justify-center flex-shrink-0 mt-0.5">
                <span class="w-2 h-2 rounded-full bg-psred-main"></span>
              </span>
              <div class="text-sm">
                <p class="font-medium text-graphite">잔액 환불</p>
                <p class="text-slate2 mt-0.5">현재 잔액 <span class="font-semibold text-graphite">₩123,450</span>이 최초 결제수단으로 환불됩니다. 환불 처리에 영업일 3~5일이 소요됩니다.</p>
              </div>
            </div>
            <div class="flex items-start gap-3 p-4 rounded-xl bg-cloud border border-line">
              <span class="w-5 h-5 rounded-full border-2 border-psred-main flex items-center justify-center flex-shrink-0 mt-0.5">
                <span class="w-2 h-2 rounded-full bg-psred-main"></span>
              </span>
              <div class="text-sm">
                <p class="font-medium text-graphite">발신번호 회수</p>
                <p class="text-slate2 mt-0.5">등록된 발신번호 <span class="font-semibold text-graphite">3개</span>가 즉시 회수됩니다.</p>
              </div>
            </div>
            <div class="flex items-start gap-3 p-4 rounded-xl bg-cloud border border-line">
              <span class="w-5 h-5 rounded-full border-2 border-psred-main flex items-center justify-center flex-shrink-0 mt-0.5">
                <span class="w-2 h-2 rounded-full bg-psred-main"></span>
              </span>
              <div class="text-sm">
                <p class="font-medium text-graphite">API 키 폐기</p>
                <p class="text-slate2 mt-0.5">발급된 API 키 <span class="font-semibold text-graphite">2개</span>가 즉시 폐기됩니다. 해당 키를 사용 중인 서비스가 중단될 수 있습니다.</p>
              </div>
            </div>
          </div>
        </div>

        <!-- 탈퇴 사유 -->
        <div class="surface rounded-2xl p-6 mb-6">
          <h2 class="text-sm font-semibold text-graphite mb-4">탈퇴 사유 <span class="text-psred-main">*</span></h2>
          <div class="space-y-2.5 mb-4">
            <label class="flex items-center gap-3 cursor-pointer">
              <span class="radio checked"></span>
              <span class="text-sm text-graphite">서비스를 더 이상 사용하지 않아서</span>
            </label>
            <label class="flex items-center gap-3 cursor-pointer">
              <span class="radio"></span>
              <span class="text-sm text-slate2">다른 서비스로 이전할 예정이라서</span>
            </label>
            <label class="flex items-center gap-3 cursor-pointer">
              <span class="radio"></span>
              <span class="text-sm text-slate2">가격이 맞지 않아서</span>
            </label>
            <label class="flex items-center gap-3 cursor-pointer">
              <span class="radio"></span>
              <span class="text-sm text-slate2">기타</span>
            </label>
          </div>
          <textarea class="input" rows="3" placeholder="추가 의견을 남겨주세요 (선택)"></textarea>
        </div>

        <!-- 비밀번호 재확인 -->
        <div class="surface rounded-2xl p-6 mb-6">
          <h2 class="text-sm font-semibold text-graphite mb-4">비밀번호 재확인</h2>
          <label class="field-label block mb-2">현재 비밀번호</label>
          <input type="password" class="input" placeholder="비밀번호를 입력하여 탈퇴 의사를 확인합니다">
        </div>

        <!-- 액션 -->
        <div class="flex gap-3">
          <a href="24.profile.html" class="btn btn-secondary flex-1 px-5 py-3 rounded-full text-sm text-center">취소</a>
          <button class="btn btn-destructive flex-1 px-5 py-3 rounded-full text-sm">탈퇴 신청</button>
        </div>

        <!-- Success 상태 -->
        <!-- <div class="surface rounded-2xl p-6 text-center">
          <p class="text-base font-semibold text-graphite">탈퇴 신청이 접수되었습니다</p>
          <p class="text-sm text-slate2 mt-2">운영자 처리 후 계정 삭제가 확정됩니다. 처리 결과는 이메일로 안내드립니다.</p>
        </div> -->

      </div>
    </div>
  </div>
</main>
<div data-site-footer data-page-id="PG-WITHDRAWAL-001"></div>
<script src="_shared/site.js"></script>
</body>
</html>
